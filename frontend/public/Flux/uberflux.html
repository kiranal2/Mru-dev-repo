<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxPlus — Weekly Variance Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

.uf-root {
  --navy: #112736;
  --navyMd: #1C3A4A;
  --navyLt: #2D5570;
  --gold: #FEA400;
  --green: #2ECC71;
  --red: #E74C3C;
  --amber: #F39C12;
  --blue: #3498DB;
  --text: #E8EFF4;
  --muted: #7A99AA;
  --border: #243D4D;
  --surface: #1A3345;
  --surfaceLt: #213C50;
  background: #0C1E2A;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

.uf-app {
  flex: 1; display: flex; flex-direction: column;
  background: var(--navy); border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border); box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  margin: 8px; min-height: 0;
}

/* Top Bar */
.uf-topbar {
  background: #0C1E2A; padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.uf-topbar-left { display: flex; align-items: center; gap: 14px; }
.uf-logo { font-size: 16px; font-weight: 700; }
.uf-logo span { color: var(--gold); }
.uf-week-badge {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px; font-size: 11px;
  font-family: 'DM Mono', monospace; color: var(--muted);
}
.uf-topbar-right { display: flex; align-items: center; gap: 10px; }
.uf-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.uf-status-text { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.uf-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--navyLt);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--gold);
}

/* Metric Toggle */
.uf-metric-toggle {
  display: flex; align-items: center; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px;
}
.uf-metric-btn {
  padding: 4px 11px; border-radius: 4px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
  color: var(--muted); transition: all 0.15s; border: none; background: transparent;
}
.uf-metric-btn.active { background: var(--gold); color: #0C1E2A; }

/* Tabs */
.uf-tabs {
  display: flex; gap: 0; background: #0C1E2A;
  border-bottom: 1px solid var(--border); padding: 0 20px; flex-shrink: 0;
}
.uf-tab {
  padding: 10px 18px; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s; user-select: none;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'Inter', sans-serif;
}
.uf-tab:hover { color: var(--text); }
.uf-tab.active { color: var(--text); border-bottom-color: var(--gold); }

/* Metric Strip */
.uf-metric-strip {
  background: rgba(254,164,0,0.05); border-bottom: 1px solid rgba(254,164,0,0.15);
  padding: 5px 20px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; font-family: 'DM Mono', monospace; flex-shrink: 0;
}
.uf-metric-strip-label { color: var(--muted); }
.uf-metric-strip-value { color: var(--gold); font-weight: 600; letter-spacing: 0.5px; }
.uf-metric-strip-sep { color: var(--border); }
.uf-metric-strip-sub { color: var(--muted); font-size: 9.5px; }

/* Main Layout */
.uf-main {
  display: grid; grid-template-columns: 220px 1fr 280px;
  flex: 1; min-height: 0; overflow: hidden;
}

/* Sidebar */
.uf-sidebar {
  background: #0F2533; border-right: 1px solid var(--border);
  padding: 16px 0; overflow-y: auto;
}
.uf-nav-section { margin-bottom: 20px; }
.uf-nav-label {
  font-size: 9px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 0 16px; margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}
.uf-nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 16px; font-size: 12px; cursor: pointer;
  color: var(--muted); transition: all 0.1s; user-select: none;
  border: none; background: none; width: 100%; text-align: left;
  font-family: 'Inter', sans-serif;
}
.uf-nav-item:hover { background: var(--surface); color: var(--text); }
.uf-nav-item.active { background: var(--surface); color: var(--text); border-left: 2px solid var(--gold); }
.uf-nav-pill {
  font-size: 9px; border-radius: 3px; padding: 2px 6px;
  font-family: 'DM Mono', monospace; font-weight: 500;
}
.pill-red { background: rgba(231,76,60,0.2); color: #E74C3C; }
.pill-amber { background: rgba(243,156,18,0.2); color: #F39C12; }
.pill-green { background: rgba(46,204,113,0.2); color: #2ECC71; }
.pill-blue { background: rgba(52,152,219,0.2); color: #3498DB; }

/* Centre */
.uf-centre {
  overflow-y: auto; padding: 18px;
  display: flex; flex-direction: column; gap: 14px;
}

/* Signal Banner */
.uf-signal-banner {
  background: rgba(254,164,0,0.08); border: 1px solid rgba(254,164,0,0.25);
  border-radius: 8px; padding: 11px 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.uf-signal-banner.positive { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.25); }
.uf-signal-banner.info { background: rgba(52,152,219,0.08); border-color: rgba(52,152,219,0.3); }
.uf-signal-banner.critical { background: rgba(231,76,60,0.08); border-color: rgba(231,76,60,0.3); }
.uf-signal-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
.uf-signal-text { font-size: 11.5px; line-height: 1.55; }
.uf-signal-text strong { color: var(--gold); display: block; margin-bottom: 2px; font-size: 12px; }
.uf-signal-banner.positive .uf-signal-text strong { color: var(--green); }
.uf-signal-banner.info .uf-signal-text strong { color: var(--blue); }
.uf-signal-banner.critical .uf-signal-text strong { color: var(--red); }

/* Stat Cards */
.uf-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.uf-stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.uf-stat-card:hover { border-color: var(--gold); transform: translateY(-1px); }
.uf-stat-label {
  font-size: 9.5px; color: var(--muted); font-family: 'DM Mono', monospace;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
}
.uf-stat-value { font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.uf-stat-delta { font-size: 10px; font-family: 'DM Mono', monospace; }
.uf-up { color: var(--green); }
.uf-down { color: var(--red); }
.uf-warn { color: var(--amber); }

/* Commentary */
.uf-commentary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.uf-commentary-header {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.uf-commentary-title { font-size: 12px; font-weight: 600; }
.uf-commentary-meta { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.uf-commentary-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

.uf-segment-row {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; border-radius: 4px; padding: 8px;
  transition: background 0.15s; border-bottom: 1px solid var(--border);
}
.uf-segment-row:last-child { border-bottom: none; }
.uf-segment-row:hover { background: rgba(254,164,0,0.04); }
.uf-segment-row.selected { background: rgba(254,164,0,0.07); border-left: 2px solid var(--gold); padding-left: 10px; }
.uf-seg-rank {
  width: 20px; height: 20px; border-radius: 4px;
  background: var(--navyLt); display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--gold); flex-shrink: 0; margin-top: 1px;
}
.uf-seg-content { flex: 1; }
.uf-seg-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.uf-seg-text { font-size: 11px; color: var(--muted); line-height: 1.5; }
.uf-seg-tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.uf-seg-tag {
  font-size: 9.5px; border-radius: 3px; padding: 2px 7px;
  font-family: 'DM Mono', monospace;
}

/* Chart */
.uf-chart-area {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
}
.uf-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.uf-chart-title { font-size: 12px; font-weight: 600; }
.uf-chart-legend { display: flex; gap: 12px; }
.uf-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
.uf-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.uf-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
.uf-bar-group { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; cursor: pointer; position: relative; }
.uf-bar-pair { display: flex; align-items: flex-end; gap: 2px; }
.uf-bar { border-radius: 2px 2px 0 0; width: 10px; transition: height 0.4s ease; }
.uf-bar-label { font-size: 8.5px; color: var(--muted); font-family: 'DM Mono', monospace; }
.uf-bar-tooltip {
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #0C1E2A; border: 1px solid var(--gold);
  border-radius: 5px; padding: 5px 9px; font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--text); pointer-events: none; z-index: 100; white-space: nowrap;
  opacity: 0; transition: opacity 0.15s;
}
.uf-bar-group:hover .uf-bar-tooltip { opacity: 1; }

/* Drill Down */
.uf-drill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.uf-drill-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s;
}
.uf-drill-card:hover { border-color: var(--gold); transform: translateY(-1px); }
.uf-drill-card.selected { border-color: var(--gold); }
.uf-drill-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.uf-drill-card-name { font-size: 12px; font-weight: 600; }
.uf-drill-card-region { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.uf-drill-spark { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-bottom: 8px; }
.uf-spark-bar { width: 8px; border-radius: 1px 1px 0 0; transition: height 0.3s; }
.uf-drill-stats { display: flex; justify-content: space-between; }
.uf-drill-stat-item { text-align: center; }
.uf-drill-stat-val { font-size: 13px; font-weight: 700; }
.uf-drill-stat-lbl { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

/* Exceptions */
.uf-exc-list { display: flex; flex-direction: column; gap: 8px; }
.uf-exc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; gap: 12px;
}
.uf-exc-card:hover { border-color: rgba(254,164,0,0.4); transform: translateX(2px); }
.uf-exc-card.critical { border-left: 3px solid var(--red); }
.uf-exc-card.warning { border-left: 3px solid var(--amber); }
.uf-exc-card.positive { border-left: 3px solid var(--green); }
.uf-exc-card.selected { background: rgba(254,164,0,0.06); border-color: var(--gold); }
.uf-exc-icon { font-size: 18px; flex-shrink: 0; }
.uf-exc-body { flex: 1; }
.uf-exc-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.uf-exc-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }
.uf-exc-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.uf-exc-right { text-align: right; flex-shrink: 0; }
.uf-exc-val { font-size: 16px; font-weight: 700; }
.uf-exc-week { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* Signals */
.uf-signals-list { display: flex; flex-direction: column; gap: 8px; }
.uf-signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s;
}
.uf-signal-card:hover { border-color: rgba(254,164,0,0.4); }
.uf-signal-card.selected { border-color: var(--gold); }
.uf-signal-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.uf-signal-card-name { font-size: 12px; font-weight: 600; }
.uf-signal-card-type { font-size: 9px; border-radius: 3px; padding: 2px 7px; font-family: 'DM Mono', monospace; }
.uf-signal-card-body { font-size: 11px; color: var(--muted); line-height: 1.5; }
.uf-signal-card-footer { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
.uf-signal-conf { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }
.uf-signal-conf-bar { height: 3px; border-radius: 2px; background: var(--border); flex: 1; }
.uf-signal-conf-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* History */
.uf-history-list { display: flex; flex-direction: column; gap: 6px; }
.uf-history-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; transition: all 0.15s;
}
.uf-history-row:hover { border-color: rgba(254,164,0,0.4); }
.uf-history-row.current { border-color: var(--gold); background: rgba(254,164,0,0.06); }
.uf-history-row.selected { border-color: var(--gold); }
.uf-history-week { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; }
.uf-history-dates { font-size: 10px; color: var(--muted); margin-top: 2px; }
.uf-history-tags { display: flex; gap: 5px; }

/* AI Panel */
.uf-ai-panel {
  background: #0F2533; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
.uf-ai-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.uf-ai-icon { font-size: 14px; }
.uf-ai-title { font-size: 12px; font-weight: 600; }
.uf-ai-subtitle { font-size: 10px; color: var(--muted); }
.uf-ai-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 12px; min-height: 0;
}
.uf-msg { display: flex; flex-direction: column; gap: 3px; }
.uf-msg-role {
  font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}
.uf-msg-bubble { border-radius: 8px; padding: 9px 12px; font-size: 11px; line-height: 1.55; }
.uf-msg.user .uf-msg-bubble { background: var(--navyLt); color: var(--text); }
.uf-msg.ai .uf-msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.uf-msg.ai .uf-msg-bubble strong { color: var(--gold); }
.uf-msg.typing .uf-msg-bubble { color: var(--muted); font-style: italic; }

.uf-sig-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.uf-sig-item { display: flex; align-items: center; gap: 7px; font-size: 10.5px; }
.uf-sig-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.uf-ai-input-area {
  padding: 12px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.uf-ai-input-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; display: flex; align-items: center; overflow: hidden;
  transition: border-color 0.2s;
}
.uf-ai-input-wrap:hover { border-color: rgba(254,164,0,0.4); }
.uf-ai-input-wrap input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 11px; font-family: 'Inter', sans-serif;
  padding: 8px 12px; width: 100%;
}
.uf-ai-input-wrap input::placeholder { color: var(--muted); }
.uf-ai-send {
  font-size: 12px; cursor: pointer; background: var(--gold); color: #0C1E2A;
  border-radius: 4px; width: 22px; height: 22px; display: flex; align-items: center;
  justify-content: center; font-weight: 700; transition: opacity 0.15s; border: none; margin: 4px;
}
.uf-ai-send:hover { opacity: 0.8; }

.uf-ai-suggestions { display: flex; flex-direction: column; gap: 5px; }
.uf-suggestion {
  background: rgba(254,164,0,0.05); border: 1px solid rgba(254,164,0,0.15);
  border-radius: 5px; padding: 5px 10px;
  font-size: 10px; color: var(--muted); cursor: pointer;
  font-family: 'DM Mono', monospace; transition: all 0.15s; user-select: none;
  text-align: left; width: 100%;
}
.uf-suggestion:hover { border-color: var(--gold); color: var(--gold); background: rgba(254,164,0,0.08); }

/* Bottom Bar */
.uf-bottombar {
  background: #0C1E2A; border-top: 1px solid var(--border);
  padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.uf-bottom-left { display: flex; gap: 16px; }
.uf-bottom-stat { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }
.uf-bottom-stat span { color: var(--text); font-weight: 600; }
.uf-bottom-right { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* Animation */
@keyframes ufFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.uf-fade-in { animation: ufFadeIn 0.25s ease forwards; }

/* Hide tab content by default */
.tab-content { display: none; flex-direction: column; gap: 14px; }
.tab-content.active { display: flex; }
</style>

let state = {

  selectedExc: null,
  selectedDrill: null,
  selectedSignal: null,
  selectedHistory: null,
  aiMessages: [],
  suggestions: [],
  isTyping: false,
};

let typingTimeout = null;

function getRegionData() { return DATA.regions[state.region]; }
function getCompData() { return DATA.comparisons[state.comparison]; }
function getMetricData() { return state.metric === "Revenue" ? getRegionData().revenue : getRegionData().orders; }
function getSegments() {
  const comp = getCompData();
  const overrides = comp.segmentOverrides[state.region];
  if (overrides) return overrides;
  return getRegionData().segments.map(s => ({
    ...s, variance: s.variance.replace(/vs \w+(\s+\w+)?/, comp.label)
  }));
}

//  AI HELPERS
// ═══════════════════════════════════════════════════════

function scrollAI() {
  setTimeout(() => {
    const el = document.getElementById("ai-messages");
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function addUserMsg(text) {
  state.aiMessages.push({ role: "user", name: "Josh", text });
  state.isTyping = true;
  renderAIPanel();
  scrollAI();
}

function addAIMsg(html, delay) {
  delay = delay || 800;
  if (typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    state.isTyping = false;
    state.aiMessages.push({ role: "ai", name: "FluxPlus AI", html });
    renderAIPanel();
    scrollAI();
  }, delay);
}

function seedAI() {
  const r = getRegionData();
  state.aiMessages = [...r.ai.messages];
  state.suggestions = [...r.ai.suggestions];
  state.isTyping = false;
  if (typingTimeout) clearTimeout(typingTimeout);
}

    </div>
    <div class="uf-exc-list">
      ${DATA.exceptions.map(exc => `
        <div class="uf-exc-card ${exc.severity} ${state.selectedExc===exc.id?'selected':''}" onclick="handleExcClick('${exc.id}')">
          <div class="uf-exc-icon">${exc.icon}</div>
          <div class="uf-exc-body">
            <div class="uf-exc-name">${esc(exc.name)}</div>
            <div class="uf-exc-detail">${esc(exc.detail)}</div>
            <div class="uf-exc-meta">${renderTags(exc.tags)}</div>
          </div>
          <div class="uf-exc-right">
            <div class="uf-exc-val ${exc.severity==='positive'?'uf-up':exc.severity==='critical'?'uf-down':'uf-warn'}">${exc.value}</div>
            <div class="uf-exc-week">${esc(exc.week)}</div>
          </div>
        </div>
      `).join("")}
    </div>`;

  // Signals tab
  const sigHTML = `
    <div class="uf-signal-banner">
      <div class="uf-signal-icon">📡</div>
      <div class="uf-signal-text"><strong>ML Signal Radar — 6 Active Signals · W10</strong>Predictive flags generated from 14-day rolling models. Confidence scores reflect historical accuracy.</div>
    </div>
    <div class="uf-signals-list">
      ${DATA.signals.map((sig, idx) => `
        <div class="uf-signal-card ${state.selectedSignal===idx?'selected':''}" onclick="handleSignalClick(${idx})">
          <div class="uf-signal-card-header"><div class="uf-signal-card-name">${esc(sig.name)}</div><span class="uf-signal-card-type ${sig.typeCls}">${esc(sig.type)}</span></div>
          <div class="uf-signal-card-body">${esc(sig.body)}</div>
          <div class="uf-signal-card-footer"><span class="uf-signal-conf">Confidence: ${sig.confidence}%</span><div class="uf-signal-conf-bar"><div class="uf-signal-conf-fill" style="width:${sig.confidence}%;background:${sig.confColor}"></div></div></div>
        </div>
      `).join("")}
    </div>`;

  // History tab
  const histHTML = `
    <div class="uf-signal-banner info">
      <div class="uf-signal-icon">📅</div>
      <div class="uf-signal-text"><strong>12-Week Rolling History · Global</strong>Click any week to load that period's data across the full workbench.</div>
    </div>
    <div class="uf-history-list">
      ${DATA.history.map(h => `
        <div class="uf-history-row ${h.current?'current':''} ${state.selectedHistory===h.week?'selected':''}" onclick="handleHistoryClick('${h.week}')">
          <div><div class="uf-history-week">${esc(h.week)}${h.current?'<span style="color:var(--gold);font-size:9px;margin-left:6px">← CURRENT</span>':''}</div><div class="uf-history-dates">${esc(h.dates)}</div></div>
          <div class="uf-history-tags">${renderTags(h.tags)}</div>
          <div class="uf-${h.varColor}" style="font-size:15px;font-weight:700">${h.variance}</div>
        </div>
      `).join("")}
    </div>`;

  const tabContents = { analysis: analysisHTML, drilldown: drillHTML, exceptions: excHTML, signals: sigHTML, history: histHTML };

  document.getElementById("app").innerHTML = `
    <div class="uf-app">
      <!-- Top Bar -->
      <div class="uf-topbar">
        <div class="uf-topbar-left">
          <div class="uf-logo">Flux<span>Plus</span></div>
          <div class="uf-week-badge">${esc(reg.week)} · Generated 08:38 AM</div>
        </div>
        <div class="uf-topbar-right">
          <div class="uf-metric-toggle">
            <button class="uf-metric-btn ${state.metric==='Revenue'?'active':''}" onclick="handleMetricToggle('Revenue')">Revenue</button>
            <button class="uf-metric-btn ${state.metric==='Orders'?'active':''}" onclick="handleMetricToggle('Orders')">Orders</button>
          </div>
          <div class="uf-status-dot"></div>
          <div class="uf-status-text">All sources reconciled · 9/9</div>
          <div class="uf-avatar">JO</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="uf-tabs">
        ${tabs.map(t => `<button class="uf-tab ${state.tab===t.key?'active':''}" onclick="handleTabClick('${t.key}')">${t.label}</button>`).join("")}
      </div>

      <!-- Metric Strip -->
      <div class="uf-metric-strip">
        <span class="uf-metric-strip-label">Viewing</span>
        <span class="uf-metric-strip-value">${esc(state.metric)}</span>
        <span class="uf-metric-strip-sep">·</span>
        <span class="uf-metric-strip-sub">${state.metric==='Orders'?'Showing Order volume — operational fulfillment metrics':'Click Orders above to switch to Order volume view'}</span>
      </div>

      <!-- Main -->
      <div class="uf-main">
        <!-- Sidebar -->
        <div class="uf-sidebar">
          <div class="uf-nav-section">
            <div class="uf-nav-label">Regions</div>
            ${regionItems.map(r => `<button class="uf-nav-item ${state.region===r.key?'active':''}" onclick="handleRegionClick('${r.key}')">${esc(r.label)}<span class="uf-nav-pill ${regionPillColorMap[r.key]}">${regionPillMap[r.key]}</span></button>`).join("")}
          </div>
          <div class="uf-nav-section">
            <div class="uf-nav-label">Comparison</div>
            ${compItems.map(c => `<button class="uf-nav-item ${state.comparison===c.key?'active':''}" onclick="handleCompClick('${c.key}')">${esc(c.label)}</button>`).join("")}
          </div>
          <div class="uf-nav-section">
            <div class="uf-nav-label">Segments</div>
            ${segNavItems.map(s => `<button class="uf-nav-item" onclick="handleSegNav('${s.key}')">${esc(s.label)}<span class="uf-nav-pill ${s.pillCls}">${s.pill}</span></button>`).join("")}
          </div>
        </div>

        <!-- Centre -->
        <div class="uf-centre">
          <div class="uf-fade-in">${tabContents[state.tab]}</div>
        </div>

        <!-- AI Panel -->
        <div class="uf-ai-panel">
          <div class="uf-ai-header">
            <div class="uf-ai-icon">✦</div>
            <div><div class="uf-ai-title">AI Query</div><div class="uf-ai-subtitle">${tabHints[state.tab]}</div></div>
          </div>
          <div class="uf-ai-messages" id="ai-messages">
            ${state.aiMessages.map(msg => `
              <div class="uf-msg ${msg.role} uf-fade-in">
                <div class="uf-msg-role">${esc(msg.name)}</div>
                <div class="uf-msg-bubble">${msg.html || esc(msg.text || '')}</div>
              </div>
            `).join("")}
            ${state.isTyping ? `<div class="uf-msg ai typing uf-fade-in"><div class="uf-msg-role">FluxPlus AI</div><div class="uf-msg-bubble"><span style="opacity:0.5">●</span> <span style="opacity:0.3">●</span> <span style="opacity:0.15">●</span></div></div>` : ''}
          </div>
          <div class="uf-ai-input-area">
            <div class="uf-ai-input-wrap">
              <input type="text" id="chat-input" placeholder="Ask about any segment or signal..." ${state.isTyping?'disabled':''} onkeydown="handleChatKeyDown(event)">
              <button class="uf-ai-send" onclick="handleChatSubmit()" style="opacity:${state.isTyping?0.4:1}">↑</button>
            </div>
            <div class="uf-ai-suggestions">
              ${state.suggestions.map((s,i) => `<button class="uf-suggestion" onclick="handleSuggestionClick(${i})">${esc(s)}</button>`).join("")}
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Bar -->
      <div class="uf-bottombar">
        <div class="uf-bottom-left">
          <div class="uf-bottom-stat">Sources <span>9/9</span></div>
          <div class="uf-bottom-stat">Segments <span>12</span></div>
          <div class="uf-bottom-stat">Comparison <span>${esc(comp.label)}</span></div>
          <div class="uf-bottom-stat">Generated <span>08:38 AM</span></div>
        </div>
        <div class="uf-bottom-right">FluxPlus · Week 10 · ${esc(reg.label)}</div>
      </div>
    </div>`;

  scrollAI();
}

function renderAIPanel() {
  const el = document.getElementById("ai-messages");
  if (!el) return;
  el.innerHTML = state.aiMessages.map(msg => `
    <div class="uf-msg ${msg.role} uf-fade-in">
      <div class="uf-msg-role">${esc(msg.name)}</div>
      <div class="uf-msg-bubble">${msg.html || esc(msg.text || '')}</div>
    </div>
  `).join("") + (state.isTyping ? `<div class="uf-msg ai typing uf-fade-in"><div class="uf-msg-role">FluxPlus AI</div><div class="uf-msg-bubble"><span style="opacity:0.5">●</span> <span style="opacity:0.3">●</span> <span style="opacity:0.15">●</span></div></div>` : '');

  const sugEl = document.querySelector(".uf-ai-suggestions");
  if (sugEl) {
    sugEl.innerHTML = state.suggestions.map((s,i) => `<button class="uf-suggestion" onclick="handleSuggestionClick(${i})">${esc(s)}</button>`).join("");
  }
}

// ═══════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════

function handleRegionClick(r) {
  if (r === state.region) return;
  state.region = r;
  state.selectedSegment = -1;
  seedAI();
  render();
}

function handleCompClick(c) {
  if (c === state.comparison) return;
  state.comparison = c;
  state.selectedSegment = -1;
  const comp = DATA.comparisons[c];
  addUserMsg("Switch to " + comp.label);
  addAIMsg("<strong>" + comp.label + " loaded — " + getRegionData().label + ".</strong><br><br>" + comp.aiA);
  render();
}

function handleMetricToggle(m) {
  if (m === state.metric) return;
  state.metric = m;
  addUserMsg("Switch to " + m + " view");
  addAIMsg("<strong>Now showing " + (m==="Orders"?"Order volume":"Revenue (USD)") + ".</strong><br><br>The variance patterns and rankings are identical — the underlying drivers don't change with the metric lens.", 700);
  render();
}

function handleTabClick(t) {
  state.tab = t;
  render();
}

function handleSegmentClick(idx) {
  const segs = getSegments();
  const seg = segs[idx];
  state.selectedSegment = idx;
  const comp = getCompData();
  addUserMsg("Deep-dive: " + seg.name + " (" + comp.label + ")");
  addAIMsg("<strong>" + seg.name + " — " + comp.label + " analysis:</strong><br><br>" + seg.text + "<br><br><strong>Variance:</strong> " + seg.variance + " · <strong>Metric:</strong> " + state.metric + "<br><strong>Tags:</strong> " + seg.tags.map(t=>t.label).join(", "), 750);
  render();
}

function handleStatClick(type) {
  const met = getMetricData();
  const comp = getCompData();
  const reg = getRegionData();
  const totalVariance = state.metric === "Revenue" ? (comp.totalVariance || met.variance) : met.variance;
  if (type === "variance") {
    addUserMsg("What is driving the " + comp.label + " variance of " + totalVariance + "?");
    addAIMsg("<strong>Variance decomposition — " + reg.label + " · " + comp.label + ":</strong><br><br>" + (comp.signal || reg.signal.body), 750);
  } else if (type === "flagged") {
    addUserMsg("Why are " + met.flagged + " segments flagged?");
    addAIMsg("<strong>" + met.flagged + " segments flagged</strong> (" + met.flaggedDetail + ").<br><br>Flags trigger when variance exceeds 1.5 standard deviations from the rolling 8-week baseline.", 750);
  } else if (type === "driver") {
    addUserMsg("Tell me more about: " + met.driver);
    addAIMsg("<strong>Top driver: " + met.driver + "</strong> — " + met.driverDetail + ".<br><br>This factor accounts for ~50–65% of the total " + comp.label + " variance. " + reg.signal.body, 750);
  }
}

function handleSegNav(key) {
  const d = DATA.segmentNav[key];
  if (d) { addUserMsg(d.aiQ); addAIMsg(d.aiA, 850); }
}

function handleDrillClick(id) {
  state.selectedDrill = id;
  const d = DATA.drillAI[id];
  if (d) { addUserMsg(d.q); addAIMsg(d.a, 900); }
  render();
}

function handleExcClick(id) {
  state.selectedExc = id;
  const exc = DATA.exceptions.find(e => e.id === id);
  if (exc) { addUserMsg(exc.aiQ); addAIMsg(exc.aiA, 900); }
  render();
}

function handleSignalClick(idx) {
  state.selectedSignal = idx;
  const sig = DATA.signals[idx];
  const n = Math.round(sig.confidence * 0.18 + 4);
  addUserMsg("Explain: " + sig.name);
  addAIMsg("<strong>" + sig.name + "</strong><br><br><strong>Type:</strong> " + sig.type + " · <strong>Confidence: <span style='color:" + sig.confColor + "'>" + sig.confidence + "%</span></strong><br><br>" + sig.body + "<br><br>Model basis: " + n + " comparable patterns. Signal generated 08:38 AM from 9/9 sources.", 800);
  render();
}

function handleHistoryClick(week) {
  state.selectedHistory = week;
  const h = DATA.history.find(x => x.week === week);
  const d = DATA.historyAI[week];
  const q = d ? d.q : "Summarize " + week + " (" + h.dates + ")";
  const a = d ? d.a : "<strong>" + week + " — " + h.dates + "</strong><br><br>Total variance vs Plan: <strong class='uf-" + h.varColor + "'>" + h.variance + "</strong><br><br>Primary drivers: " + h.tags.map(t=>t.label).join(", ") + ".";
  addUserMsg(q);
  addAIMsg(a, 800);
  render();
}

function handleSuggestionClick(idx) {
  const s = state.suggestions[idx];
  const reg = getRegionData();
  const lastAi = reg.ai.messages.filter(m => m.role === "ai").pop();
  addUserMsg(s);
  addAIMsg("<strong>" + s + "</strong><br><br>Analyzing for <em>" + reg.label + "</em> — " + state.metric + " · " + getCompData().label + ".<br><br>" + (lastAi ? (lastAi.html || lastAi.text) : ""), 850);
}

function handleChatKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleChatSubmit(); }
}

function handleChatSubmit() {
  const input = document.getElementById("chat-input");
  const text = (input.value || "").trim();
  if (!text || state.isTyping) return;
  input.value = "";
  addUserMsg(text);
  // Generate contextual response
  const reg = getRegionData();
  const comp = getCompData();
  const met = getMetricData();
  const totalVariance = state.metric === "Revenue" ? (comp.totalVariance || met.variance) : met.variance;
  const q = text.toLowerCase();
  let resp;
  if (q.includes("risk") || q.includes("concern") || q.includes("watch"))
    resp = "<strong>Risk assessment for " + reg.label + ":</strong><br><br>" + reg.signal.body;
  else if (q.includes("action") || q.includes("recommend"))
    resp = "<strong>Recommended actions — " + reg.label + ":</strong><br><br>" + (reg.ai.messages.filter(m=>m.role==="ai").pop()?.html || reg.signal.body);
  else if (q.includes("variance") || q.includes("gap") || q.includes("miss"))
    resp = "<strong>Variance — " + reg.label + " · " + comp.label + ":</strong><br><br>Total: <strong>" + totalVariance + "</strong>. " + (comp.signal || reg.signal.body);
  else if (q.includes("driver") || q.includes("cause") || q.includes("why"))
    resp = "<strong>Top driver: " + met.driver + "</strong> — " + met.driverDetail + ".<br><br>" + reg.signal.body;
  else if (q.includes("forecast") || q.includes("next week") || q.includes("w11"))
    resp = "<strong>Forward outlook — " + reg.label + ":</strong><br><br>" + reg.signal.body;
  else
    resp = "<strong>Analysis for \"" + esc(text) + "\":</strong><br><br>" + reg.label + " — " + state.metric + " · " + comp.label + ". Total: <strong>" + totalVariance + "</strong>. " + met.flagged + " flagged. Driver: " + met.driver + ".<br><br>" + reg.signal.body;
  addAIMsg(resp, 900);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════

seedAI();
render();
</script>
</body>
</html>
