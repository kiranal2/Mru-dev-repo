<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

.ff-root {

  --bg: #0A1628; --bg-white: #112240; --bg-subtle: #0D1C36;
  --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
  --text-primary: #E8F0FF; --text-secondary: #8FA8C8; --text-muted: #4A6585;
  --green: #00D4AA; --green-bg: rgba(0,212,170,0.12); --green-br: rgba(0,212,170,0.32);
  --red: #FF5C7A; --red-bg: rgba(255,92,122,0.12); --red-br: rgba(255,92,122,0.32);
  --amber: #F5A623; --amber-bg: rgba(245,166,35,0.12); --amber-br: rgba(245,166,35,0.32);
  --sans: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace; --wordmark: 'Poppins', sans-serif;
  --sh-sm: 0 1px 4px rgba(0,0,0,0.35); --sh-md: 0 4px 16px rgba(0,0,0,0.45);
  background: var(--bg); color: var(--text-primary); font-family: var(--sans); font-size: 14px; line-height: 1.6;
  height: 100%; min-height: 0; display: flex;
}
.ff-root * { box-sizing: border-box; margin: 0; padding: 0; }

.ff-sidebar { width: 232px; flex-shrink: 0; background: var(--navy-dark); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.08); overflow-y: auto; }
.ff-sb-logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.ff-sb-wordmark { font-family: var(--wordmark); font-size: 20px; font-weight: 700; color: var(--teal); letter-spacing: -0.3px; }
.ff-sb-sub { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.32); margin-top: 2px; }
.ff-sb-group { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.ff-sb-glabel { padding: 4px 18px 7px; font-size: 10px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.26); }
.ff-sb-item { display: flex; align-items: center; gap: 9px; padding: 9px 18px; cursor: pointer; color: rgba(255,255,255,0.52); font-size: 13px; font-weight: 400; border: none; background: none; width: 100%; text-align: left; border-left: 3px solid transparent; transition: all 0.15s; user-select: none; font-family: var(--sans); }
.ff-sb-item:hover { color: rgba(255,255,255,0.82); background: rgba(255,255,255,0.05); }
.ff-sb-item.active { color: var(--teal); background: rgba(26,172,184,0.13); border-left-color: var(--teal); font-weight: 500; }
.ff-sb-icon { width: 17px; text-align: center; font-size: 14px; flex-shrink: 0; }
.ff-sb-foot { margin-top: auto; padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.06); }
.ff-fresh-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.33); }
.ff-dot-live { width: 7px; height: 7px; border-radius: 50%; background: #34D399; flex-shrink: 0; animation: ffBlink 2.2s ease-in-out infinite; }

.ff-fresh-src { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 3px; }

.ff-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.ff-topbar { padding: 13px 28px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.ff-tb-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.ff-tb-title em { font-style: normal; color: var(--teal); }
.ff-tb-right { display: flex; align-items: center; gap: 9px; }
.ff-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--bg-white); color: var(--text-secondary); font-family: var(--sans); }
.ff-btn:hover { border-color: var(--teal); color: var(--teal); }
.ff-btn.primary { background: var(--teal); border-color: var(--teal); color: var(--navy); }
.ff-btn.primary:hover { background: var(--teal-dark); }
.ff-pval { color: var(--teal); font-weight: 600; }

.ff-page { flex: 1; overflow-y: auto; padding: 22px 28px 52px; }
@keyframes ffFadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.ff-page { animation: ffFadeUp 0.22s ease; }

.ff-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; box-shadow: var(--sh-sm); }
.ff-card-title { font-size: 10.5px; font-weight: 600; letter-spacing: 1.1px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 13px; }

.ff-sg { display: grid; grid-template-columns: repeat(4,1fr); gap: 13px; margin-bottom: 18px; }
.ff-sc { background: var(--bg-white); border: 1px solid var(--border); border-radius: 12px; padding: 17px 20px; box-shadow: var(--sh-sm); position: relative; overflow: hidden; }
.ff-sc::after { content:''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
.ff-sc.t::after { background: var(--teal); }
.ff-sc.n::after { background: #4FC3F7; }
.ff-sc.r::after { background: var(--red); }
.ff-sc.a::after { background: var(--amber); }
.ff-sc-label { font-size: 10.5px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 7px; }
.ff-sc-val { font-size: 28px; font-weight: 700; line-height: 1.15; margin-bottom: 6px; }
.ff-sc-val.teal { color: var(--teal); }
.ff-sc-val.navy { color: var(--text-primary); }
.ff-sc-val.red { color: var(--red); }
.ff-sc-val.amber { color: var(--amber); }
.ff-sc-delta { font-size: 12px; display: flex; align-items: center; gap: 3px; }

.ff-up { color: var(--green); }
.ff-dn { color: var(--red); }
.ff-nt { color: var(--text-muted); }

.ff-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 16px; }
.ff-g6040 { display: grid; grid-template-columns: 3fr 2fr; gap: 15px; margin-bottom: 16px; }
.ff-mb { margin-bottom: 16px; }

.ff-narr { background: linear-gradient(135deg,rgba(0,212,170,0.07) 0%,rgba(10,22,40,0) 100%); border: 1px solid var(--teal-mid); border-radius: 12px; padding: 16px 20px; margin-bottom: 18px; }
.ff-narr-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--teal); color: #fff; font-size: 9.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 9px; }
.ff-narr-head { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 7px; line-height: 1.5; }
.ff-narr-body { font-size: 13px; color: var(--text-secondary); line-height: 1.75; }

.ff-wf { display: flex; flex-direction: column; gap: 7px; }
.ff-wf-row { display: flex; align-items: center; gap: 9px; }
.ff-wf-lbl { width: 68px; font-size: 11.5px; color: var(--text-secondary); flex-shrink: 0; }
.ff-wf-track { flex: 1; height: 25px; background: var(--bg-subtle); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
.ff-wf-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 9px; font-size: 11px; font-weight: 600; font-family: var(--mono); transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
.ff-wf-bar.pos { background: var(--green-bg); color: var(--green); border-right: 2px solid #6EE7B7; }
.ff-wf-bar.neg { background: var(--red-bg); color: var(--red); border-right: 2px solid #FCA5A5; }
.ff-wf-bar.base { background: rgba(0,212,170,0.12); color: var(--teal); border-right: 2px solid var(--teal-mid); }

.ff-dt { width: 100%; border-collapse: collapse; }
.ff-dt th { text-align: left; padding: 9px 12px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--bg-subtle); white-space: nowrap; }
.ff-dt td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.ff-dt tr:last-child td { border-bottom: none; }
.ff-dt tr:hover td { background: var(--bg-subtle); }
.ff-dt td.num { font-family: var(--mono); font-size: 12.5px; }
.ff-dt td.bold { font-weight: 600; color: var(--text-primary); }
.ff-dt td.up { color: var(--green); font-family: var(--mono); font-size: 12.5px; }
.ff-dt td.dn { color: var(--red); font-family: var(--mono); font-size: 12.5px; }

.ff-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10.5px; font-weight: 600; }
.ff-pill::before { content: '●'; font-size: 7px; }
.ff-pill.ph { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-br); }
.ff-pill.pm { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-br); }
.ff-pill.pl { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-br); }
.ff-src-tag { display: inline-block; font-size: 10px; font-family: var(--mono); font-weight: 500; color: var(--text-muted); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }
.ff-proxy-note { font-size: 11px; color: var(--text-muted); border-bottom: 1px dashed var(--border-strong); cursor: help; }

.ff-ibanner { display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 9px 15px; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.ff-ibanner-ico { color: var(--teal); font-size: 14px; flex-shrink: 0; }

.ff-tabs { display: flex; gap: 2px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 9px; padding: 3px; width: fit-content; margin-bottom: 16px; }
.ff-tab { padding: 6px 17px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text-muted); font-weight: 400; transition: all 0.15s; border: none; background: none; font-family: var(--sans); }
.ff-tab.active { background: var(--bg-white); color: var(--teal); font-weight: 600; box-shadow: var(--sh-sm); }
.ff-tab:hover:not(.active) { color: var(--text-secondary); }

.ff-sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.ff-sh-t { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.ff-sh-s { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.ff-sh-a { font-size: 12px; color: var(--teal); cursor: pointer; font-weight: 500; }
.ff-sh-a:hover { text-decoration: underline; }

.ff-fbar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.ff-fchip { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-white); transition: all 0.15s; font-family: var(--sans); }
.ff-fchip.active { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal); }

.ff-wg { display: flex; gap: 6px; flex-wrap: wrap; }
.ff-wchip { padding: 5px 13px; border-radius: 7px; font-size: 12.5px; font-family: var(--mono); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; color: var(--text-secondary); background: var(--bg-white); }
.ff-wchip:hover { border-color: var(--teal); color: var(--teal); }

.ff-acc-item { display: flex; align-items: center; gap: 13px; }

.ff-acc-lbl { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.ff-acc-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.ff-cmp-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 13px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 7px; }

.ff-ai-icon { font-size: 16px; }
.ff-ai-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.ff-ai-subtitle { font-size: 10px; color: var(--text-muted); }

.ff-ai-send { width: 30px; height: 30px; border-radius: 6px; background: var(--teal); color: var(--navy); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: opacity 0.15s; flex-shrink: 0; }

.ff-root ::-webkit-scrollbar-track { background: transparent; }
.ff-root ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
</style>

function svgLineChart(data,h,yMin,yMax,lines,yFmt){
  const pad={t:28,r:20,b:28,l:50},w=600,ch=h-pad.t-pad.b,cw=w-pad.l-pad.r,n=data.length,range=yMax-yMin||1;
  const xS=i=>pad.l+(cw/(n-1))*i, yS=v=>pad.t+ch-((v-yMin)/range)*ch;
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="ff-svg-chart" style="height:${h}px">`;
  for(let i=0;i<=5;i++){const val=yMin+(range/5)*i,y=yS(val);svg+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,0.05)"/><text x="${pad.l-8}" y="${y+4}" fill="#4A6585" font-size="10" text-anchor="end" font-family="'JetBrains Mono',monospace">${yFmt?yFmt(val):val.toFixed(0)}</text>`;}
  data.forEach((d,i)=>{svg+=`<text x="${xS(i)}" y="${h-8}" fill="#4A6585" font-size="11" text-anchor="middle" font-family="'Inter',sans-serif">${d.label}</text>`;});
  lines.forEach((line,li)=>{
    const pts=line.values.map((v,i)=>v!=null?{x:xS(i),y:yS(v)}:null).filter(Boolean);
    if(pts.length<2)return;
    const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
    if(line.fill){const fp=`${pathD} L${pts[pts.length-1].x},${pad.t+ch} L${pts[0].x},${pad.t+ch} Z`;svg+=`<path d="${fp}" fill="${line.color.replace(')',',.08)').replace('rgb','rgba')}"/>`;}
    svg+=`<path d="${pathD}" fill="none" stroke="${line.color}" stroke-width="2.5" ${line.dash?'stroke-dasharray="5 4"':''}/>`;
    if(!line.dash)pts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${line.color}" stroke="#0A1628" stroke-width="2"/>`;});
  });
  lines.forEach((l,i)=>{svg+=`<g transform="translate(${pad.l+i*110},10)"><line x1="0" x2="12" y1="5" y2="5" stroke="${l.color}" stroke-width="2" ${l.dash?'stroke-dasharray="3 2"':''}/><text x="16" y="9" fill="#8FA8C8" font-size="10.5">${l.label}</text></g>`;});
  svg+=`</svg>`; return svg;
}

function svgBarChart(data,h,yMin,yMax,sets,yFmt){
  const pad={t:28,r:20,b:28,l:50},w=600,cw=w-pad.l-pad.r,ch=h-pad.t-pad.b,n=data.length,range=yMax-yMin||1;
  const bw=Math.min(cw/n/(sets.length+1),22),groupW=bw*sets.length+4;
  const yS=v=>pad.t+ch-((v-yMin)/range)*ch;
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="ff-svg-chart" style="height:${h}px">`;
  for(let i=0;i<=5;i++){const val=yMin+(range/5)*i,y=yS(val);svg+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,0.05)"/><text x="${pad.l-8}" y="${y+4}" fill="#4A6585" font-size="10" text-anchor="end" font-family="'JetBrains Mono',monospace">${yFmt?yFmt(val):val.toFixed(0)}</text>`;}
  data.forEach((d,di)=>{
    const cx=pad.l+(cw/n)*(di+0.5);
    sets.forEach((s,si)=>{const bx=cx-groupW/2+si*(bw+2),val=s.values[di],bh=Math.max(1,((val-yMin)/range)*ch),by=yS(val);svg+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${s.color}" stroke="${s.borderColor}" stroke-width="1.5" rx="3"/>`;});
    svg+=`<text x="${cx}" y="${h-8}" fill="#4A6585" font-size="11" text-anchor="middle">${d.label}</text>`;
  });
  sets.forEach((s,i)=>{svg+=`<g transform="translate(${pad.l+i*110},10)"><rect width="10" height="10" fill="${s.color}" rx="2"/><text x="14" y="9" fill="#8FA8C8" font-size="10.5">${s.label}</text></g>`;});
  svg+=`</svg>`; return svg;
}

function svgHBarChart(labels,sets,h){
  const pad={t:28,r:30,b:10,l:85},w=600,ch=h-pad.t-pad.b,n=labels.length;
  const allV=sets.flatMap(s=>s.values),absMax=Math.max(...allV.map(Math.abs),0.1);
  const barH=Math.min(ch/n/(sets.length+0.5),14),groupH=barH*sets.length+4;
  const midX=pad.l+(w-pad.l-pad.r)/2, xS=v=>(v/absMax)*((w-pad.l-pad.r)/2);
  let svg=`<svg viewBox="0 0 ${w} ${h}" class="ff-svg-chart" style="height:${h}px"><line x1="${midX}" x2="${midX}" y1="${pad.t}" y2="${h-pad.b}" stroke="rgba(255,255,255,0.1)"/>`;
  labels.forEach((lbl,li)=>{
    const cy=pad.t+(ch/n)*(li+0.5);
    svg+=`<text x="${pad.l-8}" y="${cy+4}" fill="#8FA8C8" font-size="11" text-anchor="end">${lbl}</text>`;
    sets.forEach((s,si)=>{const val=s.values[li],bw=Math.abs(xS(val)),by=cy-groupH/2+si*(barH+1),bx=val>=0?midX:midX-bw;if(bw>0.5)svg+=`<rect x="${bx}" y="${by}" width="${bw}" height="${barH}" fill="${s.color}" stroke="${s.borderColor}" stroke-width="1" rx="2"/>`;});
  });
  sets.forEach((s,i)=>{svg+=`<g transform="translate(${pad.l+i*80},10)"><rect width="10" height="10" fill="${s.color}" rx="2"/><text x="14" y="9" fill="#8FA8C8" font-size="10">${s.label}</text></g>`;});
  svg+=`</svg>`; return svg;
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function pillCls(c){return c==="High"?"ph":c==="Medium"?"pm":"pl";}
function fmtD(v){if(v===0)return{cls:"num",t:"0.0"};return{cls:v>0?"up":"dn",t:(v>0?"+":"")+v.toFixed(1)};}
function waterfall(items){
  const maxV=Math.max(...items.map(x=>Math.abs(x.v)));
  return '<div class="ff-wf">'+items.map(x=>{const p=x.t==="base"?62:Math.min((Math.abs(x.v)/maxV)*62,62);const lbl=x.t==="base"?`$${x.v}M`:x.v>0?`+$${x.v}M`:`–$${Math.abs(x.v)}M`;return `<div class="ff-wf-row"><div class="ff-wf-lbl">${esc(x.l)}</div><div class="ff-wf-track"><div class="ff-wf-bar ${x.t}" style="width:${p}%">${lbl}</div></div></div>`;}).join("")+'</div>';
}

function renderCompare(){
  const B=WD_ALL[S.selB],C=WD_ALL[S.selC];
  const rv=(C.rev-B.rev).toFixed(1),mc=(C.margin-B.margin).toFixed(1),cc=(C.cost-B.cost).toFixed(1);
  const rvUp=parseFloat(rv)>=0,mcUp=parseFloat(mc)>=0,ccUp=parseFloat(cc)<=0;
  let insight;
  if(rvUp&&!mcUp)insight=`${C.w} grew revenue $${Math.abs(parseFloat(rv))}M but margin compressed ${Math.abs(parseFloat(mc))}pp — cost grew faster.`;
  else if(rvUp&&mcUp)insight=`${C.w} is a strong week — both revenue (+$${rv}M) and margin (+${mc}pp) improved.`;
  else if(!rvUp&&!mcUp)insight=`${C.w} was a softer week — revenue declined $${Math.abs(parseFloat(rv))}M and margin compressed ${Math.abs(parseFloat(mc))}pp.`;
  else insight=`${C.w} revenue declined but margin expanded ${mc}pp — lower volume in higher-margin products.`;
  const bWk=WEEKS.map((w,i)=>`<button class="ff-wchip ${S.selB===i?'sel':''}" onclick="S.selB=${i};render()">${w}</button>`).join("");
  const cWk=WEEKS.map((w,i)=>`<button class="ff-wchip ${S.selC===i?'cmp':''}" onclick="S.selC=${i};render()">${w}</button>`).join("");

  const tblRows=cmpRows.map(r=>{const ch=(r.cv-r.bv).toFixed(2),pct=r.bv!==0?(((r.cv-r.bv)/Math.abs(r.bv))*100).toFixed(1):"—",good=parseFloat(ch)*r.dir>=0;return `<tr><td class="bold">${r.lbl}</td><td class="num">${r.bv}</td><td class="num">${r.cv}</td><td class="${good?'up':'dn'}">${parseFloat(ch)>=0?'+':''}${ch}</td><td class="${good?'up':'dn'}">${pct==="—"?"—":(parseFloat(pct)>=0?"+":"")+pct+"%"}</td></tr>`;}).join("");
  return `<div class="ff-sh"><div><div class="ff-sh-t">Period Comparison</div><div class="ff-sh-s">Select any two weeks in Q2 2025</div></div></div>
  <div class="ff-card ff-mb" style="padding:20px 22px"><div style="display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap"><div><div class="ff-card-title" style="color:var(--teal);margin-bottom:9px">Base Week</div><div class="ff-wg">${bWk}</div></div><div><div class="ff-card-title" style="color:var(--amber);margin-bottom:9px">Compare Week</div><div class="ff-wg">${cWk}</div></div></div></div>
  <div class="ff-g2">
    <div class="ff-card"><div class="ff-card-title">Side-by-Side — Revenue & Margin</div>${svgBarChart(barData.map(d=>({label:d.label})),205,barMin,barMax,[{label:B.w,values:barData.map(d=>d.bv),color:"rgba(0,212,170,0.18)",borderColor:"#00D4AA"},{label:C.w,values:barData.map(d=>d.cv),color:"rgba(79,195,247,0.15)",borderColor:"#4FC3F7"}])}</div>
    <div class="ff-card"><div class="ff-card-title">Comparison Summary</div><div style="display:flex;flex-direction:column;gap:7px;margin-top:3px">
      <div class="ff-cmp-row"><span class="ff-cmp-lbl">Revenue Change</span><span class="ff-cmp-val" style="color:${rvUp?'var(--green)':'var(--red)'}">${rvUp?'+':''}$${rv}M (${((parseFloat(rv)/B.rev)*100).toFixed(1)}%)</span></div>
      <div class="ff-cmp-row"><span class="ff-cmp-lbl">Margin % Change</span><span class="ff-cmp-val" style="color:${mcUp?'var(--green)':'var(--red)'}">${mcUp?'+':''}${mc}pp</span></div>
      <div class="ff-cmp-row"><span class="ff-cmp-lbl">Cost Change</span><span class="ff-cmp-val" style="color:${ccUp?'var(--green)':'var(--red)'}">${parseFloat(cc)>=0?'+':''}$${cc}M</span></div>

    <div class="ff-sb-foot"><div class="ff-fresh-row"><span class="ff-dot-live"></span>Refreshed today, 07:14 AM</div><div class="ff-fresh-src">Actuals · Forecast · Proxy v2.3</div></div>
  </nav>
  <main class="ff-main">
    <div class="ff-topbar">
      <div class="ff-tb-title">${tFirst} <em>${tLast}</em></div>
      <div class="ff-tb-right">
        <button class="ff-btn" onclick="S.periodIdx=(S.periodIdx+1)%${PERIODS.length};render()">⊙ &nbsp;<span class="ff-pval">${PERIODS[S.periodIdx]}</span>&nbsp; ▾</button>
        <button class="ff-btn primary" onclick="navTo('compare')">⇄ Period Comparison</button>
      </div>
    </div>
    <div class="ff-page">${pageHTML}</div>
  </main>
  <aside class="ff-ai-panel">
    <div class="ff-ai-header"><span class="ff-ai-icon">✦</span><div><div class="ff-ai-title">Margin AI</div><div class="ff-ai-subtitle" id="ai-subtitle">Context: ${PAGE_TITLES[S.page]} · ${PERIODS[S.periodIdx]}</div></div></div>
    <div class="ff-ai-messages" id="ai-msgs"></div>
    <div class="ff-ai-input-area">
      <div class="ff-ai-suggestions" id="ai-sugs"></div>
      <div class="ff-ai-input-row">
        <input class="ff-ai-input" id="ai-inp" placeholder="Ask about margins…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleAiSend()}">
        <button class="ff-ai-send" onclick="handleAiSend()">→</button>
      </div>
    </div>
  </aside>`;
  renderAI();
}

render();
</script>
