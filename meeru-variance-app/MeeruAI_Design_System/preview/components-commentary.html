<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface-alt);font-family:var(--font-sans);}
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:14px;box-shadow:0 1px 2px rgba(15,23,42,.04);max-width:420px;}
  .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .title{font-size:13px;font-weight:600;color:var(--ink);}
  .meta{font-size:11px;color:var(--text-faint);}
  .row{display:grid;grid-template-columns:24px 1fr auto;gap:10px;padding:10px 0;border-top:1px solid var(--rule);align-items:baseline;}
  .row:first-child{border-top:0;padding-top:0;}
  .rank{width:24px;height:24px;border-radius:50%;background:var(--surface-soft);font-size:11px;font-weight:600;display:grid;place-items:center;color:var(--ink);}
  .name{font-size:13px;font-weight:600;color:var(--ink);}
  .text{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:2px;}
  .delta{font-size:11px;font-weight:500;color:var(--negative);}
</style></head><body>
<div class="card">
  <div class="hdr"><div class="title">AI Commentary — Ranked by Impact</div><div class="meta">3 ranked</div></div>
  <div class="row"><div class="rank">1</div><div><div class="name">Grocery LATAM <span class="delta">— -$2.1M</span></div><div class="text">Category demand softened after promo pull-forward; margin pressure persists.</div></div><div></div></div>
  <div class="row"><div class="rank">2</div><div><div class="name">Convenience APAC <span class="delta">— -$0.9M</span></div><div class="text">Channel mix shift; fewer basket add-ons vs. plan.</div></div><div></div></div>
</div>
</body></html>
