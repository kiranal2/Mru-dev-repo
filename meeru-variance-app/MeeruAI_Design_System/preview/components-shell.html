<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface-alt);font-family:var(--font-sans);}
  .shell{display:grid;grid-template-columns:auto 1fr;border:1px solid var(--rule);border-radius:12px;overflow:hidden;background:var(--surface);}
  .tabs{display:flex;align-items:stretch;height:44px;border-bottom:1px solid var(--rule);grid-column:1 / -1;}
  .tab{padding:0 14px;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;text-decoration:none;}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
  .rail{width:200px;background:var(--surface);border-right:1px solid var(--rule);padding:10px;}
  .rail-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:4px 0 6px;}
  .rail-item{display:flex;justify-content:space-between;padding:5px 8px;border-radius:6px;font-size:12px;color:var(--ink);cursor:pointer;}
  .rail-item:hover{background:var(--surface-soft);}
  .rail-item.active{background:var(--primary-tint);color:var(--primary);font-weight:600;}
  .rail-item .d{font-variant-numeric:tabular-nums;font-size:11px;font-weight:500;}
  .neg{color:var(--negative);}
  .warn{color:var(--warning);}
  .pos{color:var(--positive);}
  .faint{color:var(--text-faint);}
  .canvas{padding:14px;min-height:120px;font-size:12px;color:var(--text-faint);}
  svg{width:14px;height:14px;}
</style></head><body>
<div class="shell">
  <div class="tabs" style="grid-column:1 / -1;">
    <a class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Performance</a>
    <a class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Margin</a>
    <a class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>Flux</a>
  </div>
  <aside class="rail">
    <div class="rail-lbl">Regions</div>
    <div class="rail-item active"><span>Global</span><span class="d neg">-$4.2M</span></div>
    <div class="rail-item"><span>North America</span><span class="d warn">-$1.1M</span></div>
    <div class="rail-item"><span>LATAM</span><span class="d neg">-$2.4M</span></div>
    <div class="rail-item"><span>EMEA</span><span class="d pos">+$0.3M</span></div>
    <div class="rail-item"><span>APAC</span><span class="d warn">-$0.9M</span></div>
    <div class="rail-lbl" style="margin-top:14px;">Segments</div>
    <div class="rail-item"><span>Grocery</span><span class="d neg">-$2.1M</span></div>
    <div class="rail-item"><span>Pharmacy</span><span class="d faint">flat</span></div>
  </aside>
  <div class="canvas">Canvas content —&nbsp;KPI row, chart, commentary.</div>
</div>
</body></html>
