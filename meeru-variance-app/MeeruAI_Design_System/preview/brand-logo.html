<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .panel{border:1px solid var(--rule);border-radius:12px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:120px;}
  .panel.dark{background:#0A0A0A;border-color:#262626;color:#F5F5F5;}
  .logo-img{height:32px;}
  .logo-text{font-size:26px;font-weight:700;letter-spacing:-.01em;}
  .logo-text .ai{color:var(--brand-coral);}
  .panel.dark .logo-text{color:#F5F5F5;}
  .panel.dark .logo-text .ai{color:var(--brand-coral);}
  .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);}
  .panel.dark .lbl{color:#737373;}
</style></head><body>
  <div class="panel">
    <img class="logo-img" src="../assets/meeru-logo.png" alt="MeeruAI"/>
    <div class="lbl">Light · Wordmark (PNG)</div>
  </div>
  <div class="panel dark">
    <div class="logo-text">Meeru<span class="ai">AI</span></div>
    <div class="lbl">Dark · Text fallback</div>
  </div>
</body></html>
