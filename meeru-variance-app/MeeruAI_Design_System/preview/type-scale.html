<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:70px 1fr 90px;gap:14px;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--rule);}
  .row:last-child{border-bottom:0;}
  .tag{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}
  .meta{font-size:10px;color:var(--text-faint);font-variant-numeric:tabular-nums;text-align:right;}
  .ex{color:var(--ink);}
</style></head><body>
  <div class="row"><div class="tag">h1</div><div class="ex" style="font-size:24px;font-weight:600;letter-spacing:-0.01em;">Good morning, Mai.</div><div class="meta">24 · 600 · tight</div></div>
  <div class="row"><div class="tag">h2</div><div class="ex" style="font-size:22px;font-weight:600;letter-spacing:-0.01em;">Day 4 / 5 · Close</div><div class="meta">22 · 600 · tight</div></div>
  <div class="row"><div class="tag">h3</div><div class="ex" style="font-size:18px;font-weight:600;letter-spacing:-0.01em;">Performance Intelligence</div><div class="meta">18 · 600 · tight</div></div>
  <div class="row"><div class="tag">title</div><div class="ex" style="font-size:13px;font-weight:600;">Watchlist</div><div class="meta">13 · 600</div></div>
  <div class="row"><div class="tag">body</div><div class="ex" style="font-size:13px;line-height:1.55;">Enterprise churn spiked — three logos did not renew.</div><div class="meta">13 · 400</div></div>
  <div class="row"><div class="tag">body-sm</div><div class="ex" style="font-size:12px;line-height:1.55;color:var(--text-muted);">3 items need your attention before Thursday.</div><div class="meta">12 · 400</div></div>
</body></html>
