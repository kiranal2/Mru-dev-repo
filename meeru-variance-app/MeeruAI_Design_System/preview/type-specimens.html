<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:96px 1fr 80px;gap:14px;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--rule);}
  .row:last-child{border-bottom:0;}
  .tag{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}
  .meta{font-size:10px;color:var(--text-faint);font-variant-numeric:tabular-nums;text-align:right;}
</style></head><body>
  <div class="row"><div class="tag">eyebrow</div><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);">Live Pins</div><div class="meta">10 · 600 · +8%</div></div>
  <div class="row"><div class="tag">faint</div><div style="font-size:11px;color:var(--text-faint);">just now · 12s ago</div><div class="meta">11 · 400</div></div>
  <div class="row"><div class="tag">muted sm</div><div style="font-size:11px;color:var(--text-muted);">Ranked for CFO</div><div class="meta">11 · 400</div></div>
  <div class="row"><div class="tag">kpi value</div><div style="font-size:26px;font-weight:600;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;color:var(--ink);">-$4.2M</div><div class="meta">26 · 600 · num</div></div>
  <div class="row"><div class="tag">display</div><div style="font-size:28px;font-weight:700;letter-spacing:-0.01em;">Meeru<span style="color:var(--brand-coral)">AI</span></div><div class="meta">28 · 700</div></div>
</body></html>
