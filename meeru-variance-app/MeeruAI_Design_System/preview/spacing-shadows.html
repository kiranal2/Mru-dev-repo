<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:var(--surface-alt);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .cell{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .card{width:100%;height:72px;border-radius:12px;background:var(--surface);border:1px solid var(--rule);}
  .e1{box-shadow:0 1px 2px rgba(15,23,42,.04);}
  .e2{box-shadow:0 4px 12px rgba(15,23,42,.08);}
  .e3{box-shadow:0 12px 32px rgba(15,23,42,.15);}
  .lbl{font-size:11px;font-weight:600;color:var(--ink);}
  .sub{font-size:10px;color:var(--text-muted);}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="card e1"></div><div class="lbl">e1 — rest</div><div class="sub">Cards default</div></div>
  <div class="cell"><div class="card e2"></div><div class="lbl">e2 — hover</div><div class="sub">Lift on hover</div></div>
  <div class="cell"><div class="card e3"></div><div class="lbl">e3 — float</div><div class="sub">Dropdowns · popovers</div></div>
</div>
</body></html>
