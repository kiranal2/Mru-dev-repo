<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .box{width:56px;height:56px;background:var(--primary-tint);border:1px solid var(--primary-weak);}
  .lbl{font-size:10px;font-weight:600;color:var(--ink);}
  .val{font-size:9px;color:var(--text-faint);font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:4px;"></div><div class="lbl">sm</div><div class="val">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:6px;"></div><div class="lbl">md</div><div class="val">6px</div></div>
  <div class="cell"><div class="box" style="border-radius:8px;"></div><div class="lbl">lg</div><div class="val">8px</div></div>
  <div class="cell"><div class="box" style="border-radius:12px;"></div><div class="lbl">xl</div><div class="val">12px</div></div>
  <div class="cell"><div class="box" style="border-radius:16px;"></div><div class="lbl">2xl</div><div class="val">16px</div></div>
  <div class="cell"><div class="box" style="border-radius:999px;"></div><div class="lbl">pill</div><div class="val">full</div></div>
</div>
</body></html>
