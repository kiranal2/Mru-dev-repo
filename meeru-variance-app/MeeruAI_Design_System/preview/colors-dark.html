<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#0A0A0A;font-family:var(--font-sans);color:#F5F5F5;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:8px;border:1px solid #262626;padding:10px;display:flex;flex-direction:column;gap:6px;background:#141414;}
  .chip{height:44px;border-radius:6px;border:1px solid #262626;}
  .lbl{font-size:11px;font-weight:600;color:#F5F5F5;}
  .hex{font-size:10px;color:#A3A3A3;font-variant-numeric:tabular-nums;}
  .role{font-size:9px;color:#737373;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#0A0A0A;"></div><div class="lbl">Surface</div><div class="hex">#0A0A0A</div></div>
  <div class="sw"><div class="chip" style="background:#141414;"></div><div class="lbl">Surface Alt</div><div class="hex">#141414</div></div>
  <div class="sw"><div class="chip" style="background:#1F1F1F;"></div><div class="lbl">Surface Soft</div><div class="hex">#1F1F1F</div></div>
  <div class="sw"><div class="chip" style="background:#262626;"></div><div class="lbl">Rule</div><div class="hex">#262626</div></div>
  <div class="sw"><div class="chip" style="background:#FF9B6C;"></div><div class="lbl">Primary</div><div class="hex">#FF9B6C</div></div>
  <div class="sw"><div class="chip" style="background:#22C55E;"></div><div class="lbl">Positive</div><div class="hex">#22C55E</div></div>
  <div class="sw"><div class="chip" style="background:#F59E0B;"></div><div class="lbl">Warning</div><div class="hex">#F59E0B</div></div>
  <div class="sw"><div class="chip" style="background:#F87171;"></div><div class="lbl">Negative</div><div class="hex">#F87171</div></div>
</div>
</body></html>
