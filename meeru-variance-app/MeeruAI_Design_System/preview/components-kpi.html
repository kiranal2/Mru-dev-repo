<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface-alt);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .kpi{background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:14px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
  .eyebrow{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
  .val{font-size:26px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:var(--ink);margin-top:4px;}
  .delta{font-size:11px;margin-top:4px;}
  .neg{color:var(--negative);}
  .pos{color:var(--positive);}
  .warn{color:var(--warning);}
  .watch{display:inline-flex;align-items:center;gap:4px;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:var(--primary-tint);color:var(--primary);float:right;}
  .watch .d{width:3px;height:3px;border-radius:50%;background:currentColor;}
</style></head><body>
<div class="grid">
  <div class="kpi">
    <div class="eyebrow">Total Variance <span class="watch"><span class="d"></span>Watch</span></div>
    <div class="val">-$4.2M</div>
    <div class="delta neg">-8.2% vs Plan</div>
  </div>
  <div class="kpi">
    <div class="eyebrow">Segments Flagged</div>
    <div class="val">3 / 4</div>
    <div class="delta warn">2 at-risk</div>
  </div>
  <div class="kpi">
    <div class="eyebrow">Top Driver</div>
    <div class="val">Grocery</div>
    <div class="delta neg">-$2.1M</div>
  </div>
</div>
</body></html>
