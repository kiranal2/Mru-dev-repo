<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MeeruAI — Variance Workbench (UI Kit)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="kit.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body data-screen-label="Variance Workbench">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [tab, setTab] = useState('performance');
  const [region, setRegion] = useState('global');
  const [sideNav, setSideNav] = useState('variance');
  const [sentIdx, setSentIdx] = useState(null);
  const [chat, setChat] = useState(window.KITDATA.chat);
  const [val, setVal] = useState('');

  const onSend = () => {
    if (!val.trim()) return;
    setChat(c => [...c, { who: 'user', time: 'just now', body: val }]);
    setVal('');
    setTimeout(() => {
      setChat(c => [...c, { who: 'ai', time: 'just now', body: 'Let me pull the latest drivers for that — scanning 312 GL lines and the labor roster.' }]);
    }, 600);
  };

  const onNbaSend = (i) => { setSentIdx(i); setTimeout(() => setSentIdx(null), 1800); };

  return (
    <div className="vw-app">
      <AppHeader />
      <div className="vw-app-body">
        <IconSidebar active={sideNav} onNavigate={setSideNav} />
        <div className="vw-main-col">
          <WorkbenchTabs active={tab} onChange={setTab} />
          <div className="vw-wb-grid">
            <TopNav scope={window.KITDATA.scope} />
            <LeftRail regionKey={region} onRegion={setRegion} />
            <div className="vw-canvas">
              <KpiRow kpis={window.KITDATA.kpis} />
              <VarianceChart title="Weekly Variance — Global · Q1 FY2026" bars={window.KITDATA.bars} />
              <Commentary items={window.KITDATA.commentary} persona="CFO" />
              <NextBestAction items={window.KITDATA.nba} onSend={onNbaSend} sentIdx={sentIdx} />
            </div>
            <ChatPanel messages={chat} value={val} onChange={setVal} onSend={onSend} />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
